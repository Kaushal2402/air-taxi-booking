<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>Acme Mobility · Module 08 — Vehicle & Fleet</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body, #root { height: 100%; }
  body { background: var(--bg); }
  .ab { width: 100%; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-sans); overflow: hidden; display: flex; }
  .theme-fab { position: fixed; bottom: 18px; right: 18px; z-index: 1000; display: flex; background: var(--surface); border: 1px solid var(--rule-strong); border-radius: 4px; overflow: hidden; box-shadow: var(--shadow-pop); }
  .theme-fab button { height: 36px; padding: 0 14px; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); display: flex; align-items: center; gap: 7px; border-right: 1px solid var(--rule); }
  .theme-fab button:last-child { border-right: 0; }
  .theme-fab button.on { color: var(--ink); background: var(--surface-2); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="Module 08 - screens.jsx"></script>
<script type="text/babel">
function ThemeToggle() {
  const [theme, setTheme] = React.useState(() => document.documentElement.getAttribute('data-theme') || 'light');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
  return (<div className="theme-fab">
    <button className={theme === 'light' ? 'on' : ''} onClick={() => setTheme('light')}><Icon name="sun" size={13} /> Light</button>
    <button className={theme === 'dark' ? 'on' : ''} onClick={() => setTheme('dark')}><Icon name="moon" size={13} /> Dark</button>
  </div>);
}
function App() {
  return (<><DesignCanvas>
    <DCSection id="vehicles" title="Vehicle & Fleet" subtitle="Vehicle directory, detail with documents and class, fleet vendors · 1440 × 920">
      <DCArtboard id="directory" label="8.1 · Vehicle Directory" width={1440} height={920}>
        <div className="ab"><VehicleDirectoryScreen /></div>
      </DCArtboard>
      <DCArtboard id="detail"    label="8.2 · Vehicle Detail" width={1440} height={1040}>
        <div className="ab"><VehicleDetailScreen /></div>
      </DCArtboard>
      <DCArtboard id="vendors"   label="8.3 · Fleet Owners & Vendors" width={1440} height={1040}>
        <div className="ab"><VendorDirectoryScreen /></div>
      </DCArtboard>
    </DCSection>
  </DesignCanvas><ThemeToggle /></>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
