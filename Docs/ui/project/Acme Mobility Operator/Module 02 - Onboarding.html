<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>Acme Mobility · Operator Panel · Module 02 — Onboarding & Company Profile</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body, #root { height: 100%; }
  body { background: var(--bg); }
  .ab { width: 100%; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-sans); overflow: hidden; display: flex; }
  .theme-fab { position: fixed; bottom: 18px; right: 18px; z-index: 1000; display: flex; background: var(--surface); border: 1px solid var(--rule-strong); border-radius: 4px; overflow: hidden; box-shadow: var(--shadow-pop); }
  .theme-fab button { height: 36px; padding: 0 14px; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); display: flex; align-items: center; gap: 7px; border-right: 1px solid var(--rule); }
  .theme-fab button:last-child { border-right: 0; }
  .theme-fab button.on { color: var(--ink); background: var(--surface-2); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="Module 02 - screens.jsx"></script>
<script type="text/babel">
function ThemeToggle() {
  const [theme, setTheme] = React.useState(() => document.documentElement.getAttribute('data-theme') || 'light');
  React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
  return (<div className="theme-fab">
    <button className={theme === 'light' ? 'on' : ''} onClick={() => setTheme('light')}><Icon name="sun" size={13} /> Light</button>
    <button className={theme === 'dark' ? 'on' : ''} onClick={() => setTheme('dark')}><Icon name="moon" size={13} /> Dark</button>
  </div>);
}
function App() {
  return (<><DesignCanvas>
    <DCSection id="onboarding-wizard" title="Onboarding Wizard" subtitle="2.1 · New operator submits company, certs, bases, and payout for admin approval · 1280 × 860">
      <DCArtboard id="wiz-company" label="2.1a · Step 1 — Company Details" width={1280} height={860}>
        <div className="ab"><WizCompanyScreen /></div>
      </DCArtboard>
      <DCArtboard id="wiz-certs" label="2.1b · Step 2 — Certifications & Insurance" width={1280} height={860}>
        <div className="ab"><WizCertsScreen /></div>
      </DCArtboard>
      <DCArtboard id="wiz-bases" label="2.1c · Step 3 — Operating Bases" width={1280} height={860}>
        <div className="ab"><WizBasesScreen /></div>
      </DCArtboard>
      <DCArtboard id="wiz-payout" label="2.1d · Step 4 — Payout Details" width={1280} height={860}>
        <div className="ab"><WizPayoutScreen /></div>
      </DCArtboard>
      <DCArtboard id="wiz-review" label="2.1e · Step 5 — Review & Submit" width={1280} height={860}>
        <div className="ab"><WizReviewScreen /></div>
      </DCArtboard>
    </DCSection>

    <DCSection id="approval-and-profile" title="Approval & Profile" subtitle="2.2 Approval status (gated, pre-approval) · 2.3 Company profile (post-approval maintenance) · 1280 × 940">
      <DCArtboard id="approval-status" label="2.2 · Approval Status" width={1280} height={940}>
        <div className="ab"><ApprovalStatusScreen /></div>
      </DCArtboard>
      <DCArtboard id="company-profile" label="2.3 · Company Profile" width={1440} height={940}>
        <div className="ab"><CompanyProfileScreen /></div>
      </DCArtboard>
    </DCSection>
  </DesignCanvas><ThemeToggle /></>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
