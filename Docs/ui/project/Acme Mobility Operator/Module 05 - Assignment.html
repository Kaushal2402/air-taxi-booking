<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<title>Acme Mobility · Operator Panel · Module 05 — Assignment</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body, #root { height: 100%; }
  body { background: var(--bg); }
  .ab { width: 100%; height: 100%; background: var(--bg); color: var(--ink); font-family: var(--font-sans); overflow: hidden; display: flex; }
  .theme-fab { position: fixed; bottom: 18px; right: 18px; z-index: 1000; display: flex; background: var(--surface); border: 1px solid var(--rule-strong); border-radius: 4px; overflow: hidden; box-shadow: var(--shadow-pop); }
  .theme-fab button { height: 36px; padding: 0 14px; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-3); display: flex; align-items: center; gap: 7px; border-right: 1px solid var(--rule); cursor: pointer; background: none; }
  .theme-fab button:last-child { border-right: 0; }
  .theme-fab button.on { color: var(--ink); background: var(--surface-2); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="Module 05 - screens.jsx"></script>

<script type="text/babel">
function ThemeToggle() {
  const [theme, setTheme] = React.useState(
    () => document.documentElement.getAttribute('data-theme') || 'light'
  );
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);
  return (
    <div className="theme-fab">
      <button className={theme === 'light' ? 'on' : ''} onClick={() => setTheme('light')}>
        <Icon name="sun" size={13} /> Light
      </button>
      <button className={theme === 'dark' ? 'on' : ''} onClick={() => setTheme('dark')}>
        <Icon name="moon" size={13} /> Dark
      </button>
    </div>
  );
}

function App() {
  return (
    <>
      <DesignCanvas>

        {/* ── Section 5.1 · Assignment Board ─────────────────── */}
        <DCSection
          id="assignment-board"
          title="Assignment Board"
          subtitle="5.1 · Day-view Gantt, unassigned queue, crew availability strip · 1440 × 900"
        >
          <DCArtboard
            id="board-normal"
            label="5.1a · Board — normal state (3 unassigned, BKR-0601 placed on VT-HXE)"
            width={1440}
            height={900}
          >
            <div className="ab">
              <AssignmentBoardScreen variant="normal" />
            </div>
          </DCArtboard>

          <DCArtboard
            id="board-conflict"
            label="5.1b · Board — conflict state (VT-HXD overlap at 14:00)"
            width={1440}
            height={900}
          >
            <div className="ab">
              <AssignmentBoardScreen variant="conflict" />
            </div>
          </DCArtboard>
        </DCSection>

        {/* ── Section 5.2 · Crew Assignment ──────────────────── */}
        <DCSection
          id="crew-assignment"
          title="Crew Assignment"
          subtitle="5.2 · Captain + F/O selection, FDP check, pre-assignment checklist · 1440 × 960"
        >
          <DCArtboard
            id="crew-assign"
            label="5.2 · BKR-0601 — Crew assignment (VT-HXE, AW169)"
            width={1440}
            height={960}
          >
            <div className="ab">
              <CrewAssignmentScreen />
            </div>
          </DCArtboard>
        </DCSection>

      </DesignCanvas>
      <ThemeToggle />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
