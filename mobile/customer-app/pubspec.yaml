name: customer_app
description: "Air Taxi Customer App — white-label premium mobility booking"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP
  dio: ^5.4.0
  dio_cache_interceptor: ^3.5.0

  # Real-time
  socket_io_client: ^2.0.3+1

  # Code gen
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Maps
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # Push
  firebase_messaging: ^15.1.0
  firebase_core: ^3.3.0

  # Payments (razorpay_flutter added back when arm64 simulator slice is available)

  # Local DB (offline queue)
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.22

  # UUID generation
  uuid: ^4.4.0

  # i18n
  intl: ^0.20.2

  # Shared packages
  utbp_theme:
    path: ../shared/packages/utbp_theme
  utbp_api_client:
    path: ../shared/packages/utbp_api_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  drift_dev: ^2.18.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true

